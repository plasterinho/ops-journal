server {
    listen 80;

    server_name _;

    root /usr/share/nginx/html;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    location = /monitor/version {
        default_type application/json;
        # For development, we can return a static version. In production,
        # we serve the generated JSON file.
        # return 200 '{"version": "dev"}';
        # try_files monitor_version.json =404;
        alias /usr/share/nginx/html/monitor_version.json;
    }

    location = /metrics {
        proxy_pass http://127.0.0.1:8000/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    location /app-metrics {
        proxy_pass http://127.0.0.1:8000/metrics;
    }

    location /nginx-metrics {
        stub_status;
    }
}
