# This is the default Nginx configuration file for our application.
# It sets up a basic HTTP server that serves static files for the frontend
# application, provides a health check endpoint, and exposes some monitoring
# endpoints for metrics and status information. The configuration also includes
# a custom log format for access logs, which formats the logs in JSON
# for easier parsing and analysis.
# Set up a custom log format named "json_combined" that formats the access logs in JSON.
# This format includes various pieces of information about each request, such as the timestamp,
# request ID, remote IP address, request method, URI, status code, bytes sent, referrer, user agent, and request time.
log_format json_combined escape=json
    '{'
    '"time_local":"$time_iso8601",'
    '"request_id":"$request_id",'
    '"remote_addr":"$remote_addr",'
    '"request_method":"$request_method",'
    '"request_uri":"$request_uri",'
    '"status":"$status",'
    '"body_bytes_sent":"$body_bytes_sent",'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"request_time":"$request_time"'
    '}';

server {

    # The listen directive tells Nginx to listen for incoming HTTP requests on port 80.
    # This means that the Nginx server will accept requests sent to port 80, which is the standard port for HTTP traffic.
    # We will use SSL later for secure HTTPS traffic, but for now, we are just setting up the basic HTTP server.
    listen 80;

    # The server_name directive is set to "_" which is a catch-all for any hostname.
    # This means that this server block will handle requests for any hostname
    # that doesn't match another server block. In this case, since we only have
    # one server block, it will handle all incoming requests regardless of the hostname used.
    server_name _;

    # The root directive specifies the root directory for serving static files.
    # In this case, it is set to /usr/share/nginx/html, which is the default directory
    # where Nginx looks for files to serve.
    # This means that when a request comes in for a static file, Nginx will look
    # for that file in the /usr/share/nginx/html directory.
    # For example, if a request comes in for /index.html, Nginx will look
    # for /usr/share/nginx/html/index.html and serve it if it exists.
    root /usr/share/nginx/html;

    # Use the custom log format for the access logs.
    access_log /var/log/nginx/access.log json_combined;

    # Set the X-Request-ID header for all incoming requests to the value of the $request_id variable.
    # The $request_id variable is automatically generated by Nginx for each request
    # and provides a unique identifier for each request.
    proxy_set_header X-Request-ID $request_id;

    # The main location block serves the static files for the frontend application.
    # It uses the try_files directive to first attempt to serve the requested URI
    # as a file or directory, and if that fails, it falls back to serving index.html.
    # This is a common setup for single-page applications (SPAs) where the frontend
    # routing is handled client-side, and all paths should serve the same index.html file.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # The /health endpoint is a simple health check that returns a 200 OK status with a plain text response.
    # This can be used by load balancers or monitoring systems to check if the application is running and responsive.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    # The /monitor/version endpoint serves a JSON file containing the version of the application.
    # This can be used for monitoring and debugging purposes to verify which version
    # of the application is currently deployed. In development, it can return a static version string,
    # while in production it serves a generated JSON file that should be created during the build or deployment process.
    location = /monitor/version {
        default_type application/json;
        # For development, we can return a static version. In production,
        # we serve the generated JSON file.
        # return 200 '{"version": "dev"}';
        # try_files monitor_version.json =404;
        alias /usr/share/nginx/html/monitor_version.json;
    }

    # Proxy requests to /app-metrics to the metrics server running on localhost:8000.
    location /app-metrics {
        proxy_pass http://127.0.0.1:8000/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # The /nginx_status endpoint provides basic status information about the Nginx server.
    # It is protected so that only requests from localhost (127.0.0.1) are allowed.
    # This is useful for monitoring the health and performance of the Nginx server itself.
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
